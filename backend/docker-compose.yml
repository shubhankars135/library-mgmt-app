version: "3.9"

services:
  db:
    image: postgres:15
    container_name: library-db
    restart: always
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    container_name: library-backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://library:library@db:5432/library_db
    ports:
      - "8000:8000"

volumes:
  postgres_data:
